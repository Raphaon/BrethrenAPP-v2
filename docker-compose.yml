version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: brethren_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: brethren_user
      POSTGRES_PASSWORD: brethren_pass
      POSTGRES_DB: brethren_db
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U brethren_user -d brethren_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - brethren_net

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: brethren_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://brethren_user:brethren_pass@postgres:5432/brethren_db
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-change_this_in_production_min_64_chars_xxxxxxxxxxxxxxxxx}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change_this_refresh_in_production_min_64_chars_xxxxxxxx}
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      JWT_REFRESH_EXPIRES_IN_DAYS: 7
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      CORS_CREDENTIALS: "true"
      RATE_LIMIT_WINDOW_MS: 900000
      RATE_LIMIT_MAX: 1000
      AUTH_RATE_LIMIT_WINDOW_MS: 900000
      AUTH_RATE_LIMIT_MAX: 10
      LOG_LEVEL: info
      DEFAULT_PAGE_SIZE: 20
      MAX_PAGE_SIZE: 100
    ports:
      - "3000:3000"
    volumes:
      - ./uploads:/app/uploads
    networks:
      - brethren_net
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # PgAdmin pour le développement (optionnel)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: brethren_pgadmin
    profiles: ["dev"]
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@brethren.dev
      PGADMIN_DEFAULT_PASSWORD: pgadmin123
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - brethren_net

volumes:
  postgres_data:

networks:
  brethren_net:
    driver: bridge
